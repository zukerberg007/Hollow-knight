zote.name=Zote The Mighty:
zote.listen=Press UP to Listen
zote.main.0=Curse this wretched kingdom! And curse you for interrupting me!
zote.main.1=I am Zote the Mighty, a knight of great renown.
zote.main.2=Do not stand in my way, or you shall taste my nail, 'Life Ender'!
zote.precept.0=Precept One: 'Always Win Your Battles'. Losing teaches you nothing.
zote.precept.1=Precept Two: 'Never Let Them Laugh at You'. Fools laugh at everything.
zote.precept.2=Precept Three: 'Always Be Rested'. Taking a moment to rest is essential.
zote.precept.3=Precept Four: 'Forget Your Past'. The past is painful, and thinking about it can only bring you misery.
