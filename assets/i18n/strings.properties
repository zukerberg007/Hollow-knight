guide.ability.nail=NAIL ATTACK
guide.ability.nail.desc=Press {0} to swing your nail. Hitting enemies grants 11 SOUL.
guide.ability.jump=JUMP & DOUBLE JUMP
guide.ability.jump.desc=Press {0} to jump. Press again mid-air for double jump. Hold jump key for higher jump.
guide.ability.dash=DASH
guide.ability.dash.desc=Press {0} to dash horizontally. Short cooldown. Grants invincibility during dash.
guide.ability.focus=FOCUS / HEAL
guide.ability.focus.desc=Hold {0} while standing still. After 1.5 sec, consumes 33 SOUL to restore 1 health mask.
guide.ability.soul=SOUL VESSEL
guide.ability.soul.desc=Max 99 SOUL. Displayed as a circular orb. Gain SOUL by hitting enemies.
guide.ability.masks=HEALTH MASKS
guide.ability.masks.desc=Max 5 masks. Each enemy hit or hazard reduces one. After taking damage, you are invincible for 1 second.
guide.ability.pogo=DOWNWARD POGO
guide.ability.pogo.desc=While airborne, press DOWN + ATTACK to strike downward. Bouncing off spikes or enemies resets dash and jump.
guide.ability.wall=WALL CLING & JUMP
guide.ability.wall.desc=Hold toward a wall while airborne to slide down slowly. Press jump to leap off the wall.

