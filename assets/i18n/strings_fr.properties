guide.abilities=CAPACITÉS & MÉCANIQUES
guide.ability.nail=COUP D'AIGUILLON
guide.ability.nail.desc=Appuyez sur {0} pour donner un coup d'aiguillon. Toucher un ennemi rapporte 11 ÂME.
guide.ability.jump=SAUT & DOUBLE SAUT
guide.ability.jump.desc=Appuyez sur {0} pour sauter. Appuyez de nouveau en l'air pour un double saut. Maintenez la touche pour sauter plus haut.
guide.ability.dash=RUÉE
guide.ability.dash.desc=Appuyez sur {0} pour une ruée horizontale. Court temps de recharge. Rend invincible pendant la ruée.
guide.ability.focus=CONCENTRATION / SOIN
guide.ability.focus.desc=Maintenez {0} en restant immobile. Après 1,5 s, consomme 33 ÂME pour restaurer 1 masque de vie.
guide.ability.soul=RÉCEPTACLE D'ÂME
guide.ability.soul.desc=Maximum 99 ÂME. Affichée sous forme d'orbe circulaire. Gagnez de l'ÂME en frappant les ennemis.
guide.ability.masks=MASQUES DE VIE
guide.ability.masks.desc=Maximum 5 masques. Chaque coup ennemi ou danger en retire un. Après avoir subi des dégâts, vous êtes invincible pendant 1 seconde.
guide.ability.pogo=REBOND VERS LE BAS
guide.ability.pogo.desc=En l'air, appuyez sur BAS + ATTAQUE pour frapper vers le bas. Rebondir sur des piques ou des ennemis réinitialise la ruée et le saut.
guide.ability.wall=MUR : ACCROCHE & SAUT
guide.ability.wall.desc=Maintenez la direction vers un mur en l'air pour glisser lentement. Appuyez sur saut pour bondir du mur.

