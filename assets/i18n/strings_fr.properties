charm.1=Attrape-Âme
charm.1.desc=Augmente l'Âme gagnée en frappant les ennemis avec votre aiguillon.
charm.2=Maître de la Ruée
charm.2.desc=Permet d'utiliser la ruée bien plus souvent.
charm.3=Force Incassable
charm.3.desc=Renforce le Chevalier, doublant les dégâts de l'aiguillon.
charm.4=Entaille Rapide
charm.4.desc=Augmente la vitesse d'attaque et réduit le temps entre les coups.
charm.5=Concentration Rapide
charm.5.desc=Augmente la vitesse de concentration de l'ÂME pour se soigner.
charm.6=Coup Puissant
charm.6.desc=Augmente la force de recul infligée aux ennemis.
charm.7=Ombre Tranchante
charm.7.desc=Traversez les ennemis en ruée sans subir de dégâts tout en les blessant. Allonge la ruée.
charm.8=Coeur du Vide
charm.8.desc=Augmente les dégâts des sorts de 50% et débloque des variantes du vide.
inv.voidheart.locked=[NON ACQUIS] Ce charme est caché quelque part dans Hallownest.
inv.voidheart.permanent=[PERMANENT] Une fois obtenu, le Coeur du Vide fait partie de vous à jamais. Il n'utilise aucune encoche.

