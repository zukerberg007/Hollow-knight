zote.name=Zote le Puissant :
zote.listen=Appuyez sur HAUT pour écouter
zote.main.0=Maudit soit ce royaume misérable ! Et maudit sois-tu de m'interrompre !
zote.main.1=Je suis Zote le Puissant, un chevalier de grand renom.
zote.main.2=Ne te mets pas en travers de mon chemin, ou tu goûteras à mon aiguillon, 'Finisseur de Vie' !
zote.precept.0=Précepte Un : 'Gagne toujours tes batailles'. Perdre n'apprend rien.
zote.precept.1=Précepte Deux : 'Ne les laisse jamais se moquer de toi'. Les idiots rient de tout.
zote.precept.2=Précepte Trois : 'Sois toujours reposé'. Prendre un moment pour se reposer est essentiel.
zote.precept.3=Précepte Quatre : 'Oublie ton passé'. Le passé est douloureux, et y penser n'apporte que misère.
